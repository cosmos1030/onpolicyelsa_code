# wandb sweep: GMP-BEST + token-level KD on DeepSeek-R1-Distill-Qwen-1.5B
# Eval conditions: 100 samples, 8192 max_new_tokens (matches SparseGPT baseline)
#
# Usage:
#   cd /home1/doyoonkim/projects/elsa
#   wandb sweep sweep_configs/gmp_kd_deepseek_1.5b.yaml
#   for i in {1..4}; do sbatch scripts/slurm_gmp_sweep_agent.sh <SWEEP_ID>; done

program: main.py
command:
  - ${env}
  - /home1/doyoonkim/miniconda3/envs/rac/bin/python
  - ${program}
  - --model=/home1/doyoonkim/.cache/huggingface/hub/models--deepseek-ai--DeepSeek-R1-Distill-Qwen-1.5B/snapshots/ad9f0ae0864d7fbcd1cd905e3c6c5b069cc8b562
  - --dataset=math_cot
  - --data_path=/home1/doyoonkim/projects/elsa/data/math_220k_cot.jsonl
  - --do_gmp=true
  - --gmp_steps=1024
  - --gmp_batch_size=1
  - --gmp_grad_accum=8
  - --gmp_lr=1e-5
  - --gmp_warmup_ratio=0.05
  - --gmp_mask_interval=32
  - --gmp_fisher_beta=0.999
  - --gmp_kd_lambda=0.5
  - --gmp_kd_temperature=2.0
  - --gmp_kd_topk=100
  - --gmp_save_path=/home1/doyoonkim/projects/elsa/models
  - --gmp_max_prompt_len=512
  - --gmp_max_seq_len=2048
  - --save_model=true
  - --eval_math500=true
  - --math500_max_new_tokens=8192
  - --math500_max_samples=100
  - --eval_zero_shot=false
  - --wandb=true
  - --wandb_project=gmp_qwen3_1.5b
  - --seed=42
  - --push_to_hub=true
  - ${args}

name: gmp_kd_deepseek_1.5b
method: grid
project: gmp_qwen3_1.5b
entity: dyk6208-gwangju-institute-of-science-and-technology

parameters:
  sparsity_ratio:
    values: [0.3, 0.5, 0.7, 0.9]
