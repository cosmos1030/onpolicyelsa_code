# wandb sweep: Qwen3-0.6B GKD (on-policy distillation) + math_500 evaluation
#
# Usage:
#   cd /home1/doyoonkim/projects/RAC/open-r1-main
#   wandb sweep sweep_configs/qwen3_0.6_gkd.yaml
#   sbatch scripts/slurm_sweep_agent_gkd_qwen3.sh <SWEEP_ID>

program: scripts/gkd_and_eval.sh
command:
  - ${env}
  - bash
  - ${program}
  - --model_name_or_path=models/Qwen3-0_pruned_50_all_tokens1000000_prunemethod_SparseGPT_thirds_1_2_3__OpenR1-Math-220k
  - --teacher_model_name_or_path=Qwen/Qwen3-0.6B
  - --dataset_name=open-r1/OpenR1-Math-220k
  - --dataset_prompt_column=problem
  - --do_train=True
  - --do_eval=False
  - --lmbda=1.0
  - --beta=1.0
  - --temperature=1.0
  - --max_new_tokens=4096
  - --adam_beta1=0.9
  - --adam_beta2=0.95
  - --adam_epsilon=1e-8
  - --weight_decay=0.1
  - --max_grad_norm=1.0
  - --max_steps=90
  - --per_device_train_batch_size=1
  - --gradient_accumulation_steps=4
  - --bf16=True
  - --gradient_checkpointing=True
  - --report_to=wandb
  - --logging_steps=1
  - --save_strategy=steps
  - --save_steps=15
  - --save_total_limit=6
  - --seed=42
  - --push_to_hub=False
  - ${args}

name: qwen3_0.6_gkd
method: grid
project: rac_qwen3_0.6_pruning
entity: dyk6208-gwangju-institute-of-science-and-technology

parameters:
  learning_rate:
    values: [1e-6, 1e-5, 5e-5, 1e-4, 5e-4]
  sparse_optimizer:
    values: [MaskedAdam]
  lr_scheduler_type:
    values: [constant]
