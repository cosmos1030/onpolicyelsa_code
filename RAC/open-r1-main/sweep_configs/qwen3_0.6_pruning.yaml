# wandb sweep: Qwen3-0.6B pruning hyperparameter search
#
# Usage:
#   cd /home1/doyoonkim/projects/RAC/open-r1-main
#   wandb sweep sweep_configs/qwen3_0.6_pruning.yaml
#   sbatch scripts/slurm_sweep_agent_pruning_qwen3.sh <SWEEP_ID>

program: src/open_r1/grpo.py
command:
  - ${env}
  - /home1/doyoonkim/miniconda3/envs/rac/bin/python
  - ${program}
  - --config
  - recipes/Qwen3-0.6B/grpo/config_pruning.yaml
  - --model_name_or_path=Qwen/Qwen3-0.6B
  - --dataset_name=open-r1/OpenR1-Math-220k
  - --dataset_prompt_column=problem
  - --do_train=False
  - --prune=True
  - --prune_calib_tokens=1_000_000
  - --push_to_hub=False
  - --score_completions=False
  - --report_to=wandb
  - ${args}

name: qwen3_0.6_pruning_sweep_test
method: grid
project: rac_qwen3_0.6_pruning
entity: dyk6208-gwangju-institute-of-science-and-technology

parameters:
  pruning_method:
    values: [SparseGPT]
  prune_sparsity:
    values: [0.5]
