# wandb sweep: DeepSeek-R1-Distill-Qwen-1.5B SparseGPT pruning with CoT trace calibration
# Sweeps over sparsity 30~90%
# Eval conditions match GMP: 100 samples, 8192 max_new_tokens
#
# Usage:
#   cd /home1/doyoonkim/projects/RAC/open-r1-main
#   wandb sweep sweep_configs/deepseek_r1_1.5b_cot_sparsity.yaml
#   for i in {1..4}; do sbatch scripts/slurm_sweep_agent_deepseek_cot_sparsity.sh <SWEEP_ID>; done

program: src/open_r1/grpo.py
command:
  - ${env}
  - /home1/doyoonkim/miniconda3/envs/rac/bin/python
  - ${program}
  - --config
  - recipes/DeepSeek-R1-Distill-Qwen-1.5B/grpo/config_pruning.yaml
  - --dataset_name=/home1/doyoonkim/projects/RAC/open-r1-main/math_trace/dataset_DeepSeek-R1-Distill-Qwen-1_trace_OpenR1-Math-220k_.jsonl
  - --dataset_prompt_column=prompt
  - --do_train=False
  - --prune=True
  - --pruning_method=SparseGPT
  - --prune_calib_tokens=1_000_000
  - --math_eval_max_new_tokens=8192
  - --math_eval_max_samples=100
  - --push_to_hub=False
  - --score_completions=False
  - --report_to=wandb
  - ${args}

name: deepseek_r1_1.5b_cot_sparsity
method: grid
project: gmp_qwen3_1.5b
entity: dyk6208-gwangju-institute-of-science-and-technology

parameters:
  prune_sparsity:
    values: [0.3, 0.5, 0.7, 0.9]
