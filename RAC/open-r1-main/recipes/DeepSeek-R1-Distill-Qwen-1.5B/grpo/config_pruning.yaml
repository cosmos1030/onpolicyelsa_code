- endif %}{%- endfor -%}{% if ns.is_tool %}{{'<пљЬtoolвЦБoutputsвЦБendпљЬ>'}}{% endif %}{% if add_generation_prompt and not ns.is_tool %}{{'<пљЬAssistantпљЬ>'}}{% endif %}"
dataset_name: open-r1/OpenR1-Math-220k
dataset_prompt_column: problem
system_prompt: "You are a helpful AI Assistant that provides well-reasoned and detailed responses. You first think about the reasoning process as an internal monologue and then provide the user with the answer. Respond in the following format: <think>\n...\n</think>\n<answer>\n...\n</answer>"

# GRPO trainer config
bf16: true
use_vllm: false
do_train: false
do_eval: true
gradient_accumulation_steps: 8
gradient_checkpointing: false
log_level: info
logging_steps: 1
logging_strategy: steps
max_prompt_length: 512
max_completion_length: 4096
num_generations: 2
output_dir: data/DeepSeek-R1-Distill-Qwen-1.5B-pruned
overwrite_output_dir: true
per_device_eval_batch_size: 4
per_device_train_batch_size: 1
push_to_hub: false
report_to:
- wandb
reward_funcs:
- accuracy
- format
- tag_count
reward_weights:
- 1.0
- 1.0
- 1.0
save_strategy: "no"
seed: 42
temperature: 0.7
warmup_ratio: 0.1

# Pruning config
prune: true
pruning_method: SparseGPT
prune_sparsity: 0.5
prune_calib_tokens: 1_000_000
score_completions: false
